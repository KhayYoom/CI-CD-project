name: CI/CD Pipeline
 
on:

  push:

    branches: [ main ]
 
jobs:

  build:

    name: Build and Push

    runs-on: ubuntu-latest
 
    steps:

      - name: Checkout code

        uses: actions/checkout@v4
 
      - name: Login to DockerHub

        uses: docker/login-action@v3

        with:

          username: ${{ secrets.DOCKER_USERNAME }}

          password: ${{ secrets.DOCKER_TOKEN }}
 
      - name: Validate DOCKER_USERNAME

        env:

          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}

        run: |

          CLEAN_USERNAME=$(echo "$DOCKER_USERNAME" | xargs | tr '[:upper:]' '[:lower:]')

          if [ -z "$CLEAN_USERNAME" ]; then

            echo "DOCKER_USERNAME is empty after cleanup"

            exit 1

          fi

          echo "DOCKER_USERNAME looks valid"
 
      - name: Build, tag, and push image to DockerHub

        env:

          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}

          IMAGE_NAME: my-image

        run: |

          DOCKER_USERNAME=$(echo "$DOCKER_USERNAME" | xargs | tr '[:upper:]' '[:lower:]')

          IMAGE_REF="$DOCKER_USERNAME/$IMAGE_NAME:latest"
 
          echo "Building $IMAGE_REF"

          docker build -t "$IMAGE_REF" .

          docker push "$IMAGE_REF"
 
  test:

    name: Run Tests

    runs-on: ubuntu-latest
 
    steps:

      - name: Checkout code

        uses: actions/checkout@v4
 
      - name: Set up Python

        uses: actions/setup-python@v5

        with:

          python-version: '3.x'
 
      - name: Install dependencies

        run: |

          python -m pip install --upgrade pip

          pip install -r requirements.txt
 
      - name: Test with pytest

        run: |

          pip install pytest

          pytest test.py
 